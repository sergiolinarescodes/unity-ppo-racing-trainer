behaviors:
  RacingDriver:
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096
      buffer_size: 40960
      # Cold-start configuration. Every feature present from step 0,
      # so there is no curriculum-boundary cliff.
      learning_rate: 3.0e-4
      beta: 1.0e-2
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 128
      num_layers: 2
      normalize: true
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 20
    checkpoint_interval: 200000
    # Per memory feedback_indefinite_training_max_steps.md — supervisor
    # does NOT retry clean max_steps exits. Cap high so multi-day
    # unattended runs do not exit early.
    max_steps: 200000000
    time_horizon: 1000
    summary_freq: 30000
    threaded: true

# Cold-start launches MUST export RACING_RACE_SCOPED=0 in the process
# env before mlagents-learn starts, so RaceCoordinator's
# ReadRaceScopedEnv() override forces per-car terminals back on. A
# cold-start policy cannot finish a 3-lap race, so without this flag
# episodes never terminate and the trainer logs "No episode was
# completed since last summary" for millions of steps with zero
# reward gradient. The supervisor takes care of this via:
#   pwsh tools/train_unattended.ps1 -RaceScoped 0 ...

engine_settings:
  width: 84
  height: 84
  quality_level: 0
  time_scale: 20.0
  target_frame_rate: -1
  capture_frame_rate: 60
