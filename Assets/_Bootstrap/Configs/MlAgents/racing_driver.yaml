behaviors:
  RacingDriver:
    trainer_type: ppo
    hyperparameters:
      batch_size: 4096
      buffer_size: 40960
      # Cold-start configuration. Every feature present from step 0,
      # so there is no curriculum-boundary cliff.
      learning_rate: 3.0e-4
      beta: 1.0e-2
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      hidden_units: 128
      num_layers: 2
      normalize: true
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 20
    checkpoint_interval: 200000
    # Per memory feedback_indefinite_training_max_steps.md — supervisor
    # does NOT retry clean max_steps exits. Cap high so multi-day
    # unattended runs do not exit early.
    max_steps: 200000000
    time_horizon: 1000
    summary_freq: 30000
    threaded: true

# No curriculum. Single fixed environment from step 0: every reward
# channel, observation channel, archetype personality, fuel scarcity,
# tire wear → grip degradation (no puncture terminal). Internally
# this maps to stage_id=5 because that is the only profile with the
# full feature mask; supervisor never rewrites this value.
#
# GOTCHA — stage_id=5 is feature-mask-only here, but RaceCoordinator
# (Assets/Scripts/Core/AiDriver/Race/RaceState.cs, IsRaceScoped) ALSO
# treats stage_id >= 5 as the "race-scoped 3-lap episode" mode. In
# race-scoped mode EpisodeRunner suppresses per-car terminals
# (Wreck / OffTrack / WallCap / StepCap-at-MaxStepsPerEpisode) and a
# car's PPO episode only ends when the RaceCoordinator finalises the
# 3-lap race. A cold-start policy cannot finish 3 laps, so episodes
# never terminate and the trainer logs "No episode was completed
# since last summary" for millions of steps with zero reward gradient.
#
# Cold-start launches MUST therefore export RACING_RACE_SCOPED=0 in
# the process env before mlagents-learn starts, so RaceCoordinator's
# ReadRaceScopedEnv() override forces per-car terminals back on.
# The supervisor takes care of this via:
#   pwsh tools/train_unattended.ps1 -RaceScoped 0 ...
# Without that flag the run will wedge after the first few episodes.
environment_parameters:
  stage_id: 5.0

engine_settings:
  width: 84
  height: 84
  quality_level: 0
  time_scale: 20.0
  target_frame_rate: -1
  capture_frame_rate: 60
