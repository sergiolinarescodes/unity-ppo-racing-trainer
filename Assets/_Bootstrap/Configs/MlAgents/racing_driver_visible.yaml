# Editor-attach sandbox profile. Identical to racing_driver.yaml except
# time_scale=1 (watch the agent live) + small max_steps cap (sandbox only —
# never run a full curriculum here).
behaviors:
  RacingDriver:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 1.0e-2
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    # Beta = entropy coefficient. 0.005 → 0.01 to keep exploration alive
    # longer; the random init was getting stuck in a near-zero-action
    # local minimum.
    network_settings:
      # Smaller net for sandbox. 128×2 = ~33k params.
      hidden_units: 128
      num_layers: 2
      # Disabled: we pre-normalize observations in C#. Double-normalization
      # over a regenerating env makes the running stats unstable.
      normalize: false
      vis_encode_type: simple
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
    keep_checkpoints: 10
    checkpoint_interval: 100000
    max_steps: 1000000
    time_horizon: 1000
    summary_freq: 5000
    threaded: true

engine_settings:
  width: 1280
  height: 720
  quality_level: 2
  time_scale: 1.0
  target_frame_rate: 60
  capture_frame_rate: 60
